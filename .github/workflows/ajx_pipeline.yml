name: AJX Master Hybrid Pipeline

on:
  workflow_dispatch:
    inputs:
      index_page_input:
        description: 'STEP 2: Type Page Number OR Range (e.g. "25" or "25-27")'
        required: false
        default: ''
      exam_name:
        description: 'Exam Name (e.g. UPSI)'
        required: true
        default: 'UPSI'
      subject:
        description: 'Subject (e.g. History)'
        required: true
        default: 'History'

jobs:
  # ------------------------------------------------------------------
  # PHASE 1: SMART SPLIT (Images Banao + Upload Karo)
  # ------------------------------------------------------------------
  phase1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install google-api-python-client google-auth-oauthlib pdf2image google-generativeai Pillow

      - name: Run Phase 1
        env:
          GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
          GEMINI_API_KEYS_LIST: ${{ secrets.GEMINI_API_KEYS_LIST }}
          USER_PROVIDED_INPUT: ${{ inputs.index_page_input }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u -W ignore phase1_smart_split.py

      # 👇 YE STEP MISSING THA: Images ko agle phase ke liye save karna
      - name: Upload Images to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase1-images
          path: AJX_Phase1_Output/
          retention-days: 1

  # ------------------------------------------------------------------
  # PHASE 2: ARCHITECT (Cloud Brain)
  # ------------------------------------------------------------------
  phase2:
    needs: phase1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 👇 YE STEP MISSING THA: Google Libraries install karna
      - name: Install Libraries
        run: pip install google-api-python-client google-auth-oauthlib
      
      - name: Run Phase 2 Config
        env:
          GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python phase2_headless.py
      
      - name: Upload Config
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config
          path: config.json

  # ------------------------------------------------------------------
  # PHASE 3: FACTORY (10 Workers)
  # ------------------------------------------------------------------
  phase3:
    needs: phase1
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker_id: [1, 2, 3] # 👈 Sirf 3 Workers chalenge

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        # 👇 tqdm add kiya hai progress bar ke liye
        run: pip install google-generativeai Pillow rich firebase-admin google-api-python-client google-auth-oauthlib tqdm

      - name: Download Images (From Phase 1)
        uses: actions/download-artifact@v4
        with:
          name: phase1-images
          path: AJX_Phase1_Output

      - name: Run Worker ${{ matrix.worker_id }}
        env:
          # 👇 Worker Identification
          WORKER_ID: ${{ matrix.worker_id }}
          TOTAL_WORKERS: 3
          
          # 👇 Dedicated Keys Mapping (Python script yahan se uthayegi)
          KEYS_WORKER_1: ${{ secrets.KEYS_WORKER_1 }}
          KEYS_WORKER_2: ${{ secrets.KEYS_WORKER_2 }}
          KEYS_WORKER_3: ${{ secrets.KEYS_WORKER_3 }}
          
          # 👇 Common Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
          # ⚠️ Check: Agar aapka secret name 'FIREBASE_SERVICE_ACCOUNT' hai to wo likhen
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_KEY }} 
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        
        # 👇 Correct Filename (Arguments ki zarurat nahi, env se lega)
        run: python phase3_worker.py 

      - name: Upload Worker Output
        uses: actions/upload-artifact@v4
        with:
          name: out-${{ matrix.worker_id }}
          path: AJX_Worker_Output/
  # ------------------------------------------------------------------
  # PHASE 4: SYNC (Firebase)
  # ------------------------------------------------------------------
  phase4:
    needs: phase3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Firebase Admin
        run: pip install firebase-admin google-api-python-client google-auth-oauthlib

      - name: Download All Worker Outputs
        uses: actions/download-artifact@v4
        with:
          pattern: out-*
          path: AJX_OUTPUT_Phase2
          merge-multiple: true

      - name: Sync to Firebase
        env:
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
        run: python phase4_sync.py
