  #   if: |
  #     always() && 
  #     (
  #       inputs.start_phase == '3-Oracle' || 
  #       (inputs.start_phase == '2-Mason' && needs.Mason.result == 'success') ||
  #       (inputs.start_phase == '1-Architect' && needs.Mason.result == 'success')
  #     )
  #   ...
