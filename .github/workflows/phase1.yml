name: Phase 1 - Smart Split & Index

on:
  workflow_dispatch:  # This allows the manual "Run Workflow" button

jobs:
  run_smart_split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies (Poppler for PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          # 👇 WE ADDED 'google-generativeai' HERE
          pip install google-api-python-client google-auth-oauthlib pdf2image google-generativeai

      - name: Run Ultimate Script
        env:
          # 👇 MAKE SURE BOTH SECRETS ARE CONNECTED
          GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
          GEMINI_API_KEYS_LIST: ${{ secrets.GEMINI_API_KEYS_LIST }}
        run: python -u -W ignore phase1_smart_split.py
