name: Phase 1 - Smart Split (Multi-Page Support)

on:
  workflow_dispatch:
    inputs:
      index_page_input:
        description: 'STEP 2: Type Page Number OR Range (e.g. "25" or "25-27")'
        required: false
        default: ''

jobs:
  run_smart_split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies (Poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          # 👇 'Pillow' is required for the Collage feature
          pip install google-api-python-client google-auth-oauthlib pdf2image google-generativeai Pillow

      - name: Run Script
        env:
          GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
          GEMINI_API_KEYS_LIST: ${{ secrets.GEMINI_API_KEYS_LIST }}
          # 👇 Passes your input (e.g. "25-27") to the Python script
          USER_PROVIDED_INPUT: ${{ inputs.index_page_input }}
        run: python -u -W ignore phase1_smart_split.py
