name: Phase 1 - Smart Split

on:
  workflow_dispatch:

jobs:
  run-split:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python Libraries
        # We force version 0.7.2 because it is STABLE and has no warnings
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib pdf2image "google-generativeai==0.7.2"

      - name: Run Phase 1 Script
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GEMINI_API_KEYS_LIST: ${{ secrets.GEMINI_API_KEYS_LIST }}
        # The "-W ignore" flag tells Python to shut up about any warnings
        run: python -u -W ignore phase1_smart_split.py
