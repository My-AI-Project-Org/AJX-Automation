name: Phase 1 - Smart Split

on:
  workflow_dispatch: # Allows you to click the "Run" button manually

jobs:
  run-split:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Tools (Poppler)
        # This tool is required to convert PDF to Images
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python Libraries
        # We are using the standard latest versions. 
        # IGNORE any "FutureWarning" or "Support Ended" text in the logs. It is harmless.
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib pdf2image google-generativeai

      - name: Run Phase 1 Script
        env:
          # We map the GitHub Secrets to the Script's Environment Variables
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GEMINI_API_KEYS_LIST: ${{ secrets.GEMINI_API_KEYS_LIST }}
        run: python phase1_smart_split.py
