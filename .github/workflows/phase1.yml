name: Phase 1 - Smart Split (Magic Link Verify)

on:
  workflow_dispatch:
    inputs:
      index_page_num:
        description: 'STEP 2: Type Page Number of Index (Leave Empty for STEP 1)'
        required: false
        default: ''

jobs:
  run_smart_split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies (Poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib pdf2image google-generativeai

      - name: Run Magic Link Script
        env:
          # Secrets for API and Drive Access
          GDRIVE_OAUTH_JSON: ${{ secrets.GDRIVE_OAUTH_JSON }}
          GEMINI_API_KEYS_LIST: ${{ secrets.GEMINI_API_KEYS_LIST }}
          # This passes your typed number to the Python script
          USER_PROVIDED_PAGE: ${{ inputs.index_page_num }}
        run: python -u -W ignore phase1_smart_split.py
