name: AJX ELITE SYSTEM ENGINE v6.0

on:
  push:
    paths:
      - 'METHOD_1/**'
      - 'METHOD_2/**'
      - 'ajx_*.py' # Scripts update hone par bhi chalna chahiye
      - 'main.yml'
  workflow_dispatch:

jobs:
  # ==================================================
  # 🏭 JOB 1: SCOUT (PRODUCER)
  # Role: Parse PDF -> Cut Images -> Create Tasks
  # ==================================================
  Scout:
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.set-sub.outputs.subject }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install rich natsort firebase-admin jq PyMuPDF

      - name: Run Scout
        id: set-sub
        env:
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: |
          python ajx_scout.py
          
          # Dynamic Subject Detection Logic
          # Agar file exist karti hai tabhi read karega
          if [ -f WORKER_TASK_1.json ]; then
            SUB_NAME=$(jq -r .SUBJECT WORKER_TASK_1.json)
            echo "subject=$SUB_NAME" >> $GITHUB_OUTPUT
            echo "✅ Detected Subject: $SUB_NAME"
          else
            echo "⚠️ No Tasks Generated. Exiting."
            exit 0 
          fi

      # 🔥 CRITICAL FIX: Flatten Assets
      # Images ko deep folders se nikal kar Root 'EXTRACTED_ASSETS' me lao
      # Taaki Worker ko seedha 'EXTRACTED_ASSETS/Unit/Chapter' mile
      - name: Flatten Assets for Handoff
        run: |
          mkdir -p FINAL_ASSETS
          # Find all folders named EXTRACTED_ASSETS and copy their contents to FINAL_ASSETS
          find . -type d -name "EXTRACTED_ASSETS" -not -path "./FINAL_ASSETS*" -exec cp -r {}/. FINAL_ASSETS/ \;
          echo "✅ Assets flattened to FINAL_ASSETS folder"

      - uses: actions/upload-artifact@v4
        with:
          name: matrix-tasks
          path: WORKER_TASK_*.json

      # Upload from the Flattened Folder
      - uses: actions/upload-artifact@v4
        with:
          name: assets-pool
          path: FINAL_ASSETS/ 
          retention-days: 1

  # ==================================================
  # ⚡ JOB 2: WORKER MATRIX (CONSUMER)
  # Role: Read Image/Topic -> Generate AI MCQ -> Sync
  # ==================================================
  Matrix-Firing:
    needs: Scout
    if: needs.Scout.outputs.subject != '' # Sirf tab chalo agar Scout ne kuch banaya ho
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker_id: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      
      # 1. Download Tasks (JSON)
      - uses: actions/download-artifact@v4
        with:
          name: matrix-tasks
          
      # 2. Download Images (The Bridge)
      # Hum 'FINAL_ASSETS' artifact ko 'EXTRACTED_ASSETS' folder me download karenge
      # Isse Worker script ka path logic (os.path.join) match ho jayega
      - uses: actions/download-artifact@v4
        with:
          name: assets-pool
          path: EXTRACTED_ASSETS 

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install google-generativeai firebase-admin rich zstandard Pillow

      - name: Start Matrix Engine
        env:
          WORKER_ID: ${{ matrix.worker_id }}
          # Round Robin Keys Logic (Agar secrets me LIST hai)
          KEYS_VM_1: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_2: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_3: ${{ secrets.GEMINI_API_KEYS_LIST }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_matrix_worker.py
        
      - uses: actions/upload-artifact@v4
        with:
          name: backup-worker-${{ matrix.worker_id }}
          path: BACKUP/

  # ==================================================
  # 🏁 JOB 3: FINALIZE (SUPERVISOR)
  # Role: Audit IDs -> Create Manifest -> Mark Live -> Drive Sync
  # ==================================================
  Finalize:
    needs: [Scout, Matrix-Firing]
    if: always() # Chalo bhale hi ek worker fail ho jaye (Partial Sync is better than No Sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          pattern: backup-worker-*
          merge-multiple: true
          path: BACKUP/
          
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install rich natsort firebase-admin zstandard google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
      - name: Final Encoding
        env:
          CURRENT_SUBJECT: ${{ needs.Scout.outputs.subject }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_final_sync.py
