name: AJX ELITE SYSTEM ENGINE v6.0

on:
  push:
    paths:
      - 'METHOD_1/**'
      - 'METHOD_2/**'
      - 'ajx_*.py'
      - '.github/workflows/main.yml'
  workflow_dispatch:

jobs:
  # ==================================================
  # 🏭 JOB 1: SCOUT (PRODUCER)
  # ==================================================
  Scout:
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.set-sub.outputs.subject }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install rich natsort firebase-admin jq PyMuPDF google-generativeai
        
      - name: Run Scout
        id: set-sub
        env:
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: |
          # Scout ab fixed hai (Clean PDF Mode)
          python ajx_scout.py
          
          if [ -f WORKER_TASK_1.json ]; then
            SUB_NAME=$(jq -r .SUBJECT WORKER_TASK_1.json)
            echo "subject=$SUB_NAME" >> $GITHUB_OUTPUT
            echo "✅ Detected Subject: $SUB_NAME"
          else
            echo "⚠️ No Tasks Generated. Exiting."
            exit 1 
          fi

      - name: Flatten Assets for Handoff
        run: |
          mkdir -p FINAL_ASSETS
          # "EXTRACTED_ASSETS" folder ko dhoondh ke FINAL_ASSETS me copy karo
          # Taaki Artifact structure clean rahe
          find . -type d -name "EXTRACTED_ASSETS" -not -path "./FINAL_ASSETS*" -exec cp -r {}/. FINAL_ASSETS/EXTRACTED_ASSETS/ \;
          
          # Verification
          echo "📂 Assets Content inside FINAL_ASSETS:"
          ls -R FINAL_ASSETS
          
          if [ -z "$(ls -A FINAL_ASSETS)" ]; then
             echo "❌ CRITICAL: No Assets Found in FINAL_ASSETS!"
             exit 1
          fi

      # 👇👇👇 YE DEBUG STEP ADD KARO 👇👇👇
      - name: 🕵️ DEBUG - Show Me The Files!
        run: |
          echo "📂 Checking EXTRACTED_ASSETS folder..."
          if [ -d "EXTRACTED_ASSETS" ]; then
            echo "✅ Folder Exists! Listing contents:"
            ls -R EXTRACTED_ASSETS
          else
            echo "❌ ERROR: EXTRACTED_ASSETS folder not found!"
          fi
          
          echo "📂 Checking FINAL_ASSETS folder (Ready for Upload):"
          ls -R FINAL_ASSETS    

      - uses: actions/upload-artifact@v4
        with:
          name: matrix-tasks
          path: WORKER_TASK_*.json

      - uses: actions/upload-artifact@v4
        with:
          name: assets-pool
          path: FINAL_ASSETS/ 
          retention-days: 1

  # ==================================================
  # ⚡ JOB 2: WORKER MATRIX (CONSUMER)
  # ==================================================
  Matrix-Firing:
    needs: Scout
    if: needs.Scout.outputs.subject != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker_id: [1, 2, 3]
    
    steps:
      - uses: actions/checkout@v4
      
      # 👇 FIX 1: Tasks ko Root folder (.) me download karo
      - uses: actions/download-artifact@v4
        with:
          name: matrix-tasks
          path: .
          
      # 👇 FIX 2: Assets ko bhi Root folder me download karo (path: .)
      # Pehle ye 'path: EXTRACTED_ASSETS' tha, jisse nested folder ban rha tha
      - uses: actions/download-artifact@v4
        with:
          name: assets-pool
          path: . 

      # Debugging Step: Check karo files sahi jagah aayi ya nahi
      - name: Debug - Check Files
        run: |
          echo "📂 Current Directory Structure:"
          ls -R
          echo "--------------------------------"

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install google-generativeai firebase-admin rich zstandard Pillow

      - name: Start Matrix Engine
        env:
          WORKER_ID: ${{ matrix.worker_id }}
          # Abhi hum Same Key List use kar rahe hain teeno ke liye
          KEYS_VM_1: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_2: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_3: ${{ secrets.GEMINI_API_KEYS_LIST }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_matrix_worker.py

      - name: Organize Backup for Handoff
        env:
          SUBJECT_NAME: ${{ needs.Scout.outputs.subject }}
        run: |
          mkdir -p BACKUP/$SUBJECT_NAME
          
          echo "📦 Moving processed data for Subject: $SUBJECT_NAME"
          
          # Check agar EXTRACTED_ASSETS exist karta hai
          if [ -d "EXTRACTED_ASSETS" ]; then
            cp -r EXTRACTED_ASSETS/* BACKUP/$SUBJECT_NAME/
          else
            echo "⚠️ Warning: EXTRACTED_ASSETS not found! Worker might have failed or found nothing."
          fi
          
      - uses: actions/upload-artifact@v4
        with:
          name: backup-worker-${{ matrix.worker_id }}
          path: BACKUP/

  # ==================================================
  # 🏁 JOB 3: FINALIZE (SUPERVISOR)
  # ==================================================
  Finalize:
    needs: [Scout, Matrix-Firing]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          pattern: backup-worker-*
          merge-multiple: true
          path: BACKUP/
          
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install rich natsort firebase-admin zstandard google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
      - name: Final Encoding
        env:
          CURRENT_SUBJECT: ${{ needs.Scout.outputs.subject }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_final_sync.py
