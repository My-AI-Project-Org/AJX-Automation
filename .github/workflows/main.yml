name: AJX ELITE SYSTEM ENGINE

on:
  push:
    paths:
      - 'METHOD_1/**'
      - 'METHOD_2/**'
  workflow_dispatch:

jobs:
  # --- PHASE 1: THE MASTER SCOUT ---
  Scout:
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.set-sub.outputs.subject }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          pip install rich natsort firebase-admin PyMuPDF zstandard

      - name: Run Scout Script
        id: set-sub
        env:
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: |
          python ajx_scout.py
          # Hum subject name ko detect karke output mein set karte hain
          echo "subject=UPSI_HISTORY" >> $GITHUB_OUTPUT 

      - name: Upload Task Files
        uses: actions/upload-artifact@v4
        with:
          name: worker-tasks
          path: WORKER_TASK_*.JSON

  # --- PHASE 2: THE MATRIX (3 PARALLEL WORKERS) ---
  Matrix-Firing:
    needs: Scout
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker_id: [1, 2, 3] # Parallel VMs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Task Files
        uses: actions/download-artifact@v4
        with:
          name: worker-tasks

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          pip install google-generativeai firebase-admin rich PyMuPDF zstandard

      - name: Start Matrix Worker
        env:
          WORKER_ID: ${{ matrix.worker_id }}
          # Rotating Keys based on Worker ID
          KEYS_VM_1: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_2: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_3: ${{ secrets.GEMINI_API_KEYS_LIST }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_matrix_worker.py

      - name: Upload Partial Backups
        uses: actions/upload-artifact@v4
        with:
          name: backup-worker-${{ matrix.worker_id }}
          path: BACKUP/

  # --- PHASE 3: THE FINAL ENCODER ---
  Finalize:
    needs: [Scout, Matrix-Firing]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Backups
        uses: actions/download-artifact@v4
        with:
          pattern: backup-worker-*
          merge-multiple: true
          path: BACKUP/

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          pip install rich natsort firebase-admin zstandard

      - name: Final Encoding & Drive Sync
        env:
          CURRENT_SUBJECT: ${{ needs.Scout.outputs.subject }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_final_sync.py
