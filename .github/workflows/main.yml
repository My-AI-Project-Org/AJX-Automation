name: AJX ELITE SYSTEM ENGINE v6.0

on:
  push:
    paths:
      - 'METHOD_1/**'
      - 'METHOD_2/**'
  workflow_dispatch:

jobs:
  Scout:
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.set-sub.outputs.subject }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install rich natsort firebase-admin jq
      - name: Run Scout
        id: set-sub
        env:
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: |
          python ajx_scout.py
          # Dynamic Subject Detection Logic
          SUB_NAME=$(jq -r .SUBJECT WORKER_TASK_1.JSON)
          echo "subject=$SUB_NAME" >> $GITHUB_OUTPUT 
      - uses: actions/upload-artifact@v4
        with:
          name: matrix-tasks
          path: WORKER_TASK_*.JSON

  Matrix-Firing:
    needs: Scout
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Ek worker gire toh baaki na rukein
      matrix:
        worker_id: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: matrix-tasks
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install google-generativeai firebase-admin rich PyMuPDF zstandard
      - name: Start Matrix Engine
        env:
          WORKER_ID: ${{ matrix.worker_id }}
          KEYS_VM_1: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_2: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_3: ${{ secrets.GEMINI_API_KEYS_LIST }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_matrix_worker.py
      - uses: actions/upload-artifact@v4
        with:
          name: backup-worker-${{ matrix.worker_id }}
          path: BACKUP/

  Finalize:
    needs: [Scout, Matrix-Firing]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: backup-worker-*
          merge-multiple: true
          path: BACKUP/
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install rich natsort firebase-admin zstandard
      - name: Final Encoding
        env:
          CURRENT_SUBJECT: ${{ needs.Scout.outputs.subject }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_final_sync.py
