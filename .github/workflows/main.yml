name: AJX ELITE SYSTEM ENGINE v6.0

on:
  push:
    paths:
      - 'METHOD_1/**'
      - 'METHOD_2/**'
      - 'ajx_*.py'
      - 'main.yml'
  workflow_dispatch:

jobs:
  # ==================================================
  # 🏭 JOB 1: SCOUT (PRODUCER)
  # ==================================================
  Scout:
    # ... (Pura code same - UNTOUCHED) ...
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.set-sub.outputs.subject }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install rich natsort firebase-admin jq PyMuPDF google-generativeai
        
      - name: Run Scout
        id: set-sub
        env:
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # <-- (UNTOUCHED: Add this if missing)
        run: |
          python ajx_scout.py
          if [ -f WORKER_TASK_1.json ]; then
            SUB_NAME=$(jq -r .SUBJECT WORKER_TASK_1.json)
            echo "subject=$SUB_NAME" >> $GITHUB_OUTPUT
            echo "✅ Detected Subject: $SUB_NAME"
          else
            echo "⚠️ No Tasks Generated. Exiting."
            exit 0 
          fi

      - name: Flatten Assets for Handoff
        run: |
          mkdir -p FINAL_ASSETS
          find . -type d -name "EXTRACTED_ASSETS" -not -path "./FINAL_ASSETS*" -exec cp -r {}/. FINAL_ASSETS/ \;
          echo "✅ Assets flattened"

      - uses: actions/upload-artifact@v4
        with:
          name: matrix-tasks
          path: WORKER_TASK_*.json

      - uses: actions/upload-artifact@v4
        with:
          name: assets-pool
          path: FINAL_ASSETS/ 
          retention-days: 1

  # ==================================================
  # ⚡ JOB 2: WORKER MATRIX (CONSUMER)
  # ==================================================
  Matrix-Firing:
    needs: Scout
    if: needs.Scout.outputs.subject != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker_id: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          name: matrix-tasks
          
      - uses: actions/download-artifact@v4
        with:
          name: assets-pool
          path: EXTRACTED_ASSETS 

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install google-generativeai firebase-admin rich zstandard Pillow

      - name: Start Matrix Engine
        env:
          WORKER_ID: ${{ matrix.worker_id }}
          KEYS_VM_1: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_2: ${{ secrets.GEMINI_API_KEYS_LIST }}
          KEYS_VM_3: ${{ secrets.GEMINI_API_KEYS_LIST }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_matrix_worker.py

      # 🔥🔥🔥 CHANGE START: CREATE BACKUP STRUCTURE 🔥🔥🔥
      # Worker ne data.json 'EXTRACTED_ASSETS' me banaya hai.
      # Hame usse 'BACKUP/SubjectName' me move karna hai taaki Job 3 usse utha sake.
      - name: Organize Backup for Handoff
        run: |
          SUBJECT_NAME="${{ needs.Scout.outputs.subject }}"
          mkdir -p BACKUP/$SUBJECT_NAME
          
          # Copy everything from EXTRACTED_ASSETS to BACKUP/SubjectName
          # This copies the generated data.json files along with folder structure
          cp -r EXTRACTED_ASSETS/* BACKUP/$SUBJECT_NAME/
          
          echo "✅ Data moved to BACKUP/$SUBJECT_NAME for Final Sync"
      # 🔥🔥🔥 CHANGE END 🔥🔥🔥

      - uses: actions/upload-artifact@v4
        with:
          name: backup-worker-${{ matrix.worker_id }}
          path: BACKUP/

  # ==================================================
  # 🏁 JOB 3: FINALIZE (SUPERVISOR)
  # ==================================================
  Finalize:
    needs: [Scout, Matrix-Firing]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          pattern: backup-worker-*
          merge-multiple: true
          path: BACKUP/
          
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install rich natsort firebase-admin zstandard google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
      - name: Final Encoding
        env:
          CURRENT_SUBJECT: ${{ needs.Scout.outputs.subject }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: python ajx_final_sync.py # (UNTOUCHED: Make sure script name matches your repo)
